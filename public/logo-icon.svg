1 — High-level architecture (what talks to what)

Keep the architecture simple and secure for an MVP, with headroom to scale:

Client (Browser SPA)

React (CRA/Vite) or Next.js (if you want SSR later). Hosted as static assets on EC2 (served by Nginx) per your requirement — but I’ll show an alternate static-hosting suggestion below.

Load balancer

ALB in front of EC2 instances (for blue/green, HTTPS, health checks).

Application servers

EC2 Auto Scaling Group running your backend Node.js (or PHP) app behind ALB.

Database

Amazon RDS (MySQL) — managed, automatic backups, Multi-AZ for production.

File storage

S3 for storing user-uploaded documents (agreements, receipts) and static assets (profile pics, PDFs).

Caching / Session / Rate-limit

Amazon ElastiCache (Redis) optional for session store, caching, and rate limiting.

Secrets & Keys

AWS Secrets Manager (or Parameter Store) to store DB credentials and API keys.

Encryption

KMS for any key management you need (RDS encryption at rest, S3 SSE).

Optional: Elastic IP (for stable endpoint IP if required) and IAM roles attached to EC2 to access S3/RDS securely.

Monitoring & Logging

Use centralized logging (app writes structured logs to files → push to a centralized log storage or third party). (I’ll avoid CloudWatch + X-Ray if you prefer those excluded — alternatives noted below.)

CI/CD

GitHub Actions (recommended) → deploy to EC2 via CodeDeploy or GitHub Actions + SSH.

Note: You mentioned EC2 hosting — that’s fine. For static frontend assets, S3 + CloudFront is cheaper & faster; you can still host the backend on EC2. If you must keep everything on EC2 for now, serve the built frontend from Nginx on a separate EC2 instance or container.

2 — Concrete tech stack (recommended)

MVP-friendly, modern, maintainable:

Frontend

React + Vite (or Next.js if you want SSR later)

Component styling: Tailwind CSS (faster UI development) or plain CSS module + BEM if you prefer

State management: React Query + Context for auth (or Zustand for small app)

Form validation: React Hook Form + Zod (schema validation)

Charts (repayment progress): Recharts

Backend

Node.js + Express (TypeScript) — preferred (fast dev, lots of libraries).
Alternatives: PHP (Laravel) if your team prefers it.

ORM: TypeORM / Prisma (Prisma recommended for developer DX) for MySQL

Authentication: AWS Cognito (optional) or implement JWT-based auth with secure refresh tokens

Password hashing: bcrypt or Argon2

Email: external service (SendGrid) for now — because you said notifications are “simple alerts” (avoid SNS/SES if you prefer).

Webhooks/Realtime notifications: WebSockets (socket.io) or Server-Sent Events for browser notifications.

DB

Amazon RDS (MySQL) — primary

Optionally Read Replica for scaling reads later

Use encryption at rest and periodic backups

Storage

S3 for files (SSE-S3 or SSE-KMS)

CI/CD / DevOps

GitHub Actions → test → build → deploy (SSH/CodeDeploy)

Use Terraform for infra-as-code (recommended) or CloudFormation.

3 — SDLC & delivery process

Use Agile (Scrum) with 2-week sprints for clarity and iteration.

Suggested phases:

Discovery & Requirements (2–3 days): finalize fields, edge-cases, regulatory needs.

MVP planning: identify smallest feature set to go live (user auth, loan request, approve/reject, repayments).

Sprint 0 (infra + CI): set up repositories, CI, dev/test infra on AWS, RDS, S3, secret store.

Sprints 1..N: deliver features per sprint (detailed below).

UAT & Hardening: security review & penetration test, accessibility testing.

Production rollout: blue/green deploy with backups and rollback plan.

Minimum releases:

MVP: auth, loan request flow, lender approval, agreements acceptance, basic dashboards, manual repayment marking.

Post MVP: notifications, audit logs, file uploads, admin tools, analytics.

